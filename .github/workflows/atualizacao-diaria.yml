name: Atualização Diária Fundos CAIXA v2

on:
  workflow_dispatch:
  schedule:
    - cron: "30 12 * * 1-5"

permissions:
  contents: write

jobs:
  atualizar:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar repositório
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Instalar Chrome
        uses: browser-actions/setup-chrome@v1

      - name: Executar robô
        run: |
          python robo_sipii_asset_unificado.py

      - name: Commit dos arquivos atualizados
        run: |
          git config user.name "actions-user"
          git config user.email "actions@github.com"
          git add dados_atuais.csv data/ historico/ execucao.log sipii_caixa_*.csv sipii_caixa_*.xlsx
          git commit -m "Dados atualizados via robô v2" || echo "Sem alterações para commit"
          git push
